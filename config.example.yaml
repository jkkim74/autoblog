# Copy to config.yaml and edit. Run with: autoblog run --config config.yaml

# Tracks which source items were already published so repeated/scheduled runs
# don't regenerate duplicate posts. Delete this file to "forget" everything.
state_file: .autoblog-state.json

# Used by the `write` (Naver review-package) flow.
# Hype/over-promise phrases flagged into review.md for the human reviewer.
forbidden_expressions:
  - 무조건
  - 100%
  - 보장
  - 확정 수익
# Font sizes for the deterministic Naver HTML renderer.
naver:
  heading_px: 22
  body_px: 18

# How posts are produced. Both source aggregation and AI generation are used:
# items are pulled from sources, then Claude rewrites/summarizes them into an
# original post.
blog:
  title: "My Auto Blog"
  # Voice/instructions handed to Claude for every post.
  style: >
    Write in a clear, engaging voice for a technically literate but general
    audience. Lead with the takeaway. Avoid hype and filler.
  # Target length of generated posts, in words (a soft target).
  target_words: 700

generator:
  type: claude
  model: claude-opus-4-8
  # "high" balances quality and cost; use "max" for the most thorough drafts.
  effort: high
  # provider: anthropic (ANTHROPIC_API_KEY) or bedrock (AWS IAM, no Anthropic key).
  provider: anthropic
  # For provider: bedrock — required. The model must be enabled in this region's
  # Bedrock console; the SDK prefixes the id with "anthropic." automatically.
  # provider: bedrock
  # aws_region: us-east-1

sources:
  - type: rss
    name: Hacker News Front Page
    url: https://hnrss.org/frontpage
    # Pull at most this many items per run from this source.
    max_items: 3

# Posts are always written to Markdown. Optionally also push to a platform
# via the webhook publisher (uncomment and configure).
publishers:
  - type: markdown
    output_dir: content/posts
  # - type: webhook
  #   # Reads URL/token from AUTOBLOG_WEBHOOK_URL / AUTOBLOG_WEBHOOK_TOKEN if unset.
  #   url: https://example.com/api/posts
  #   token_env: AUTOBLOG_WEBHOOK_TOKEN
